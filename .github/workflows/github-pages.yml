name: klaus-client-workflow

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
      VITE_CHAT_API_URL: ${{ secrets.VITE_CHAT_API_URL }}
      VITE_TTS_API_URL: ${{ secrets.VITE_TTS_API_URL }}
      VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
    defaults:
      run:
        working-directory: client
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            client
          sparse-checkout-cone-mode: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Resolve base path
        run: |
          if [ -z "${VITE_BASE_PATH}" ]; then
            echo "VITE_BASE_PATH=/${{ github.event.repository.name }}/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=${VITE_BASE_PATH}" >> "$GITHUB_ENV"
          fi

      - name: Validate required environment variables
        run: |
          REQUIRED_VARS=(
            VITE_BASE_PATH
            VITE_CHAT_API_URL
            VITE_TTS_API_URL
            VITE_API_KEY
          )

          for VAR in "${REQUIRED_VARS[@]}"; do
            if [ -z "${!VAR}" ]; then
              echo "ERROR: Required environment variable '$VAR' is not set."
              exit 1
            fi
          done

          echo "All required environment variables are set."

      - name: Build app
        run: npm run build

      - name: Verify build output
        run: test -f dist/index.html

      - name: SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
